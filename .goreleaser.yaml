version: 2

project_name: autoto

before:
  hooks:
    - go mod download

builds:
  - id: autoto
    main: ./cmd/autoto
    binary: autoto
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X autoto/internal/config.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  - id: codeharbor-compat
    main: ./cmd/codeharbor
    binary: codeharbor
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X autoto/internal/config.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  # Native desktop shell requires CGO + platform WebView toolchains.
  # Multi-platform Wails artifacts are produced via scripts/build-desktop-release.sh
  # on developer machines or dedicated OS runners, not this CGO_ENABLED=0 matrix.

archives:
  - id: autoto
    ids:
      - autoto
      - codeharbor-compat
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  prerelease: auto
